<svg width="816" height="840" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>OppoKodiBridge v4 — M9207 user journey</title>
  <desc>On the M9207 Plus / UDP-203 the OPPO CEC grab is skipped. 1 You play a disc in Kodi and Kodi routes it to the external player with no blip. 2 The add-on skips the OPPO grab (no power-cycle) because the M9207 has no network One-Touch-Play. 3 You manually switch the TV input to the OPPO — the only manual step. 4 The add-on plays the disc on the OPPO over HTTP and NFS. 5 Stop is watched over HTTP only, never opening port 23. 6 You press Stop or the disc ends. 7 The TV returns to Kodi automatically via the script.cecreclaim helper running CECActivateSource. You switch to the OPPO manually but the TV switches back to Kodi automatically.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .t{font-weight:500;font-size:14px;fill:#292524}
    .ts{font-weight:400;font-size:12px;fill:#6b6760}
    .tb{fill:#1b4fb3}.tbs{fill:#2f63c9}.tc{fill:#b23c14}.tcs{fill:#c5552a}
    .gray{fill:#f2f0ea;stroke:#d8d4cc;stroke-width:1.5}
    .blue{fill:#e9f0fe;stroke:#3b7ff5;stroke-width:1.5}
    .coral{fill:#fdece7;stroke:#e8633a;stroke-width:1.8}
    .a{stroke:#8a857c;stroke-width:1.5;fill:none}
  </style>
  <defs>
    <marker id="aN" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a857c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <rect x="0" y="0" width="680" height="700" rx="14" fill="#ffffff" stroke="#e5e3dd" stroke-width="1"/>
  <text class="t" x="40" y="28" style="font-size:16px;fill:#1c1917" font-weight="600">OppoKodiBridge v4 — M9207 user journey</text>

  <g transform="translate(0,36)">
    <g><rect class="gray" x="78" y="56" width="534" height="58" rx="10"/><text class="t" x="98" y="81">1 · Play a disc in Kodi</text><text class="ts" x="98" y="99">You — Kodi routes it to the external player (no blip)</text></g>
    <g><rect class="gray" x="78" y="128" width="534" height="58" rx="10"/><text class="t" x="98" y="153">2 · The OPPO grab is skipped (M9207)</text><text class="ts" x="98" y="171">Add-on — no #POF/#PON power-cycle (cec.grab_supported = false)</text></g>
    <g><rect class="coral" x="78" y="200" width="534" height="58" rx="10"/><text class="t tc" x="98" y="225">3 · Switch the TV input to the OPPO</text><text class="ts tcs" x="98" y="243">★ You — manual (the only manual step on the M9207)</text></g>
    <g><rect class="gray" x="78" y="272" width="534" height="58" rx="10"/><text class="t" x="98" y="297">4 · OPPO plays the disc over HTTP / NFS</text><text class="ts" x="98" y="315">Add-on → OPPO — wake, init, mount, play (:436)</text></g>
    <g><rect class="gray" x="78" y="344" width="534" height="58" rx="10"/><text class="t" x="98" y="369">5 · Stop is watched over HTTP only</text><text class="ts" x="98" y="387">Add-on — /getglobalinfo poll, never opens :23 (#SVM 3)</text></g>
    <g><rect class="gray" x="78" y="416" width="534" height="58" rx="10"/><text class="t" x="98" y="441">6 · Press Stop (or the disc ends)</text><text class="ts" x="98" y="459">You</text></g>
    <g><rect class="blue" x="78" y="488" width="534" height="58" rx="10"/><text class="t tb" x="98" y="513">7 · TV returns to Kodi — automatically</text><text class="ts tbs" x="98" y="531">Auto — script.cecreclaim → CECActivateSource (Kodi's own source)</text></g>

    <line class="a" x1="345" y1="114" x2="345" y2="128" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="186" x2="345" y2="200" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="258" x2="345" y2="272" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="330" x2="345" y2="344" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="402" x2="345" y2="416" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="474" x2="345" y2="488" marker-end="url(#aN)"/>

    <rect x="78" y="566" width="16" height="12" rx="2" fill="#e8633a"/>
    <text class="ts" x="102" y="576">★ You do this manually (M9207-specific — no network grab)</text>
    <rect x="78" y="588" width="16" height="12" rx="2" fill="#3b7ff5"/>
    <text class="ts" x="102" y="598">Automatic — Kodi reclaims the TV via the script.cecreclaim helper</text>
    <text class="ts" x="78" y="620">Switch TO the OPPO manually · the TV switches BACK to Kodi automatically on stop</text>
  </g>
</svg>
