<svg width="816" height="828" viewBox="0 0 680 690" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>OppoKodiBridge v4 — architecture and CEC handoff</title>
  <desc>Setup: the service publishes runtime_config.json and installs playercorefactory.xml. Play: Kodi routes disc content to the external pcf_player process, whose orchestrator runs cec.grab_oppo (an OPPO power-cycle so the OPPO grabs the TV via its own One-Touch-Play), then handoff.play, then monitor. Stop: the orchestrator's finally calls cec.reclaim_kodi, which sends a localhost JSON-RPC Addons.ExecuteAddon to the in-Kodi script.cecreclaim helper, which runs the CECActivateSource builtin so Kodi re-asserts its own active source and the TV returns to Kodi. Single-shot per event; each device asserts only its own source; no IR, no CEC spoofing.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .t{font-weight:500;font-size:14px;fill:#292524}
    .ts{font-weight:400;font-size:12px;fill:#6b6760}
    .th{font-weight:600;font-size:14px;fill:#1c1917}
    .tg{fill:#14633f}.tgs{fill:#1f7d54}.tb{fill:#1b4fb3}.tbs{fill:#2f63c9}
    .box{fill:#f2f0ea;stroke:#d8d4cc;stroke-width:1.5}
    .grab{fill:#e7f4ee;stroke:#1f9d6b;stroke-width:1.5}
    .recl{fill:#e9f0fe;stroke:#3b7ff5;stroke-width:1.5}
    .emph{stroke-width:2.6}
    .a{stroke:#8a857c;stroke-width:1.5;fill:none}
    .ag{stroke:#1f9d6b;stroke-width:2;fill:none}
    .ab{stroke:#3b7ff5;stroke-width:2;fill:none}
    .dash{stroke-dasharray:5 4}
  </style>
  <defs>
    <marker id="aN" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a857c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1f9d6b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3b7ff5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <rect x="0" y="0" width="680" height="690" rx="14" fill="#ffffff" stroke="#e5e3dd" stroke-width="1"/>
  <text class="th" x="40" y="28" style="font-size:16px">OppoKodiBridge v4 — architecture &amp; CEC handoff</text>

  <g transform="translate(0,36)">
    <!-- phase headers -->
    <text class="th" x="40" y="34">1 · Setup (background service)</text>
    <text class="th" x="40" y="98">2 · Play</text>
    <text class="th" x="40" y="442">3 · Stop — CEC helper</text>

    <!-- SETUP -->
    <g><rect class="box" x="40" y="44" width="160" height="40" rx="8"/><text class="t" x="120" y="61" text-anchor="middle">service_cec</text><text class="ts" x="120" y="76" text-anchor="middle">background service</text></g>
    <g><rect class="box" x="240" y="44" width="196" height="40" rx="8"/><text class="t" x="338" y="61" text-anchor="middle">playercorefactory.xml</text><text class="ts" x="338" y="76" text-anchor="middle">routes disc → pcf_player</text></g>
    <g><rect class="box" x="468" y="44" width="172" height="40" rx="8"/><text class="t" x="554" y="61" text-anchor="middle">runtime_config.json</text><text class="ts" x="554" y="76" text-anchor="middle">config for ext player</text></g>
    <line class="a" x1="200" y1="64" x2="240" y2="64" marker-end="url(#aN)"/>
    <line class="a" x1="436" y1="64" x2="468" y2="64" marker-end="url(#aN)"/>

    <!-- PLAY: left entry chain -->
    <g><rect class="box" x="40" y="108" width="170" height="50" rx="8"/><text class="t" x="125" y="129" text-anchor="middle">Kodi</text><text class="ts" x="125" y="145" text-anchor="middle">playercorefactory rule</text></g>
    <g><rect class="box" x="40" y="172" width="170" height="50" rx="8"/><text class="t" x="125" y="193" text-anchor="middle">pcf_player.py</text><text class="ts" x="125" y="209" text-anchor="middle">external player · no blip</text></g>
    <g><rect class="box" x="40" y="236" width="170" height="50" rx="8"/><text class="t" x="125" y="257" text-anchor="middle">orchestrator.run</text><text class="ts" x="125" y="273" text-anchor="middle">grab · play · watch</text></g>
    <line class="a" x1="125" y1="158" x2="125" y2="172" marker-end="url(#aN)"/>
    <line class="a" x1="125" y1="222" x2="125" y2="236" marker-end="url(#aN)"/>
    <line class="a dash" x1="338" y1="84" x2="150" y2="108" marker-end="url(#aN)"/>
    <text class="ts" x="300" y="100" text-anchor="end">loaded at boot</text>

    <!-- PLAY: orchestrator actions -->
    <g><rect class="grab" x="250" y="236" width="175" height="50" rx="8"/><text class="t tg" x="337" y="257" text-anchor="middle">cec.grab_oppo</text><text class="ts tgs" x="337" y="273" text-anchor="middle">power-cycle #POF→#PON</text></g>
    <g><rect class="box" x="250" y="300" width="175" height="50" rx="8"/><text class="t" x="337" y="321" text-anchor="middle">handoff.play</text><text class="ts" x="337" y="337" text-anchor="middle">HTTP :436 · NFS · play</text></g>
    <g><rect class="box" x="250" y="364" width="175" height="50" rx="8"/><text class="t" x="337" y="385" text-anchor="middle">monitor.watch</text><text class="ts" x="337" y="401" text-anchor="middle">until stop · bounded (4.1.1)</text></g>
    <line class="a" x1="210" y1="257" x2="250" y2="259" marker-end="url(#aN)"/>
    <line class="a" x1="337" y1="286" x2="337" y2="300" marker-end="url(#aN)"/>
    <line class="a" x1="337" y1="350" x2="337" y2="364" marker-end="url(#aN)"/>

    <!-- DEVICES -->
    <g><rect class="box" x="468" y="236" width="172" height="92" rx="8"/><text class="t" x="554" y="262" text-anchor="middle">OPPO disc player</text><text class="ts" x="554" y="282" text-anchor="middle">:436 app API</text><text class="ts" x="554" y="299" text-anchor="middle">:23 / serial control</text><text class="ts" x="554" y="316" text-anchor="middle">NFS mount</text></g>
    <g><rect class="box" x="468" y="360" width="172" height="54" rx="8"/><text class="t" x="554" y="383" text-anchor="middle">TV</text><text class="ts" x="554" y="399" text-anchor="middle">HDMI-CEC bus</text></g>

    <line class="ag" x1="425" y1="255" x2="468" y2="262" marker-end="url(#aG)"/>
    <line class="a" x1="425" y1="320" x2="468" y2="292" marker-end="url(#aN)"/>
    <line class="a dash" x1="425" y1="386" x2="468" y2="314" marker-end="url(#aN)"/>
    <text class="ts" x="447" y="345" text-anchor="middle">poll</text>

    <line class="ag" x1="554" y1="328" x2="554" y2="360" marker-end="url(#aG)"/>
    <text class="ts tgs" x="562" y="348" text-anchor="start">One-Touch-Play</text>

    <!-- STOP: CEC helper chain -->
    <g><rect class="recl" x="40" y="456" width="150" height="56" rx="8"/><text class="t tb" x="115" y="480" text-anchor="middle">cec.reclaim_kodi</text><text class="ts tbs" x="115" y="497" text-anchor="middle">localhost JSON-RPC</text></g>
    <g><rect class="recl" x="210" y="456" width="170" height="56" rx="8"/><text class="t tb" x="295" y="480" text-anchor="middle">Kodi JSON-RPC :8080</text><text class="ts tbs" x="295" y="497" text-anchor="middle">Addons.ExecuteAddon</text></g>
    <g><rect class="recl emph" x="400" y="456" width="178" height="56" rx="8"/><text class="t tb" x="489" y="480" text-anchor="middle">script.cecreclaim</text><text class="ts tbs" x="489" y="497" text-anchor="middle">runs CECActivateSource</text></g>
    <line class="ab" x1="190" y1="484" x2="210" y2="484" marker-end="url(#aB)"/>
    <line class="ab" x1="380" y1="484" x2="400" y2="484" marker-end="url(#aB)"/>
    <line class="a dash" x1="337" y1="414" x2="125" y2="456" marker-end="url(#aN)"/>
    <text class="ts" x="205" y="436" text-anchor="middle">on stop · finally</text>
    <line class="ab" x1="489" y1="456" x2="545" y2="414" marker-end="url(#aB)"/>
    <text class="ts tbs" x="566" y="446" text-anchor="middle">CECActivateSource</text>

    <!-- legend -->
    <rect x="40" y="548" width="16" height="12" rx="2" fill="#1f9d6b"/>
    <text class="ts" x="64" y="558" text-anchor="start">OPPO grabs TV — its own One-Touch-Play (play side)</text>
    <rect x="40" y="570" width="16" height="12" rx="2" fill="#3b7ff5"/>
    <text class="ts" x="64" y="580" text-anchor="start">Kodi reclaims TV — via the script.cecreclaim helper (stop side)</text>
    <text class="ts" x="40" y="600" text-anchor="start">Single-shot per event · each device asserts only its OWN source · no IR, no CEC spoofing</text>
  </g>
</svg>
