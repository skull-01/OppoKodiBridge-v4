<svg width="816" height="475" viewBox="0 0 680 396" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>A single Raspberry Pi 4 driving both an IR transmitter and an IR receiver at the same time</title>
  <desc>The Pi 4 feeds an IR blaster on GPIO18 pin 12, exposed as a lirc send device, and a TSOP38238 IR receiver on GPIO17 pin 11, exposed as a lirc learn device. Both share GND on pin 6. The receiver is powered from 3.3 volts, not 5 volts.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  </style>
  <rect x="0" y="0" width="680" height="396" rx="14" fill="#ffffff" stroke="#e5e3dd" stroke-width="1"/>

  <text x="340" y="46" text-anchor="middle" font-size="16" font-weight="600" fill="#1c1917">One Pi 4 &#8594; two IR devices (send + learn)</text>
  <text x="340" y="68" text-anchor="middle" font-size="12" fill="#6b6760">Different GPIO pins &#8594; two independent /dev/lirc nodes</text>

  <rect x="48" y="92" width="150" height="216" rx="10" fill="#faf8f4" stroke="#d8d4cc" stroke-width="1.5"/>
  <text x="123" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#292524">Raspberry Pi 4</text>
  <line x1="64" y1="126" x2="182" y2="126" stroke="#e5e3dd" stroke-width="1"/>
  <g class="mono" font-size="11" fill="#6b6760">
    <text x="64" y="154">3V3 &#183; pin 1</text>
    <text x="64" y="182">5V &#183; pin 4</text>
    <text x="64" y="210">GPIO17 &#183; pin 11</text>
    <text x="64" y="238">GPIO18 &#183; pin 12</text>
    <text x="64" y="266">GND &#183; pin 6</text>
  </g>

  <rect x="300" y="108" width="196" height="72" rx="9" fill="#ffffff" stroke="#3b7ff5" stroke-width="1.8"/>
  <text x="398" y="136" text-anchor="middle" font-size="13" font-weight="600" fill="#1b4fb3">IR blaster (TX)</text>
  <text x="398" y="158" text-anchor="middle" font-size="11" fill="#6b6760">2N2222 + IR LED</text>
  <path d="M198,144 H300" fill="none" stroke="#3b7ff5" stroke-width="2.4"/>
  <polygon points="300,144 291,140 291,148" fill="#3b7ff5"/>
  <text x="249" y="136" text-anchor="middle" class="mono" font-size="9" fill="#8a857c">pins 4 &#183; 12 &#183; 6</text>
  <rect x="532" y="114" width="108" height="60" rx="8" fill="none" stroke="#3b7ff5" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="586" y="140" text-anchor="middle" class="mono" font-size="11" fill="#292524">/dev/lirc</text>
  <text x="586" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#1b4fb3">SEND</text>
  <path d="M496,144 H532" fill="none" stroke="#3b7ff5" stroke-width="2.4"/>
  <polygon points="532,144 523,140 523,148" fill="#3b7ff5"/>

  <rect x="300" y="210" width="196" height="72" rx="9" fill="#ffffff" stroke="#2f9e5f" stroke-width="1.8"/>
  <text x="398" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#1e7a49">IR receiver (RX)</text>
  <text x="398" y="260" text-anchor="middle" font-size="11" fill="#6b6760">TSOP38238 module</text>
  <path d="M198,246 H300" fill="none" stroke="#2f9e5f" stroke-width="2.4"/>
  <polygon points="300,246 291,242 291,250" fill="#2f9e5f"/>
  <text x="249" y="238" text-anchor="middle" class="mono" font-size="9" fill="#8a857c">pins 11 &#183; 1 &#183; 6</text>
  <rect x="532" y="216" width="108" height="60" rx="8" fill="none" stroke="#2f9e5f" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="586" y="242" text-anchor="middle" class="mono" font-size="11" fill="#292524">/dev/lirc</text>
  <text x="586" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#1e7a49">LEARN</text>
  <path d="M496,246 H532" fill="none" stroke="#2f9e5f" stroke-width="2.4"/>
  <polygon points="532,246 523,242 523,250" fill="#2f9e5f"/>

  <text x="340" y="322" text-anchor="middle" font-size="11" fill="#6b6760">GND (pin 6) is shared &#8212; both modules return to the same ground.</text>
  <text x="340" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#b23c14">&#9888; Power the receiver from 3.3 V (pin 1), NOT 5 V &#8212; its output must stay GPIO-safe.</text>

  <g font-size="10" fill="#6b6760">
    <circle cx="208" cy="368" r="5" fill="#3b7ff5"/><text x="218" y="371">blue = send path (TX)</text>
    <circle cx="388" cy="368" r="5" fill="#2f9e5f"/><text x="398" y="371">green = learn path (RX)</text>
  </g>
</svg>
