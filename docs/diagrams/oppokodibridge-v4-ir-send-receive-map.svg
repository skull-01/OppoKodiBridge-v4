<svg width="816" height="590" viewBox="0 0 680 492" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Connection map: a Raspberry Pi 4 header wired to both an IR transmitter and an IR receiver</title>
  <desc>The Pi 4 header is drawn with the even pin row (2-40) on top and the odd row on the bottom, pin 1 at the bottom-left. It feeds an IR blaster (TX) on 5V pin 4, GPIO18 pin 12 and GND pin 6 (all top row), and an IR receiver (RX) on 3.3V pin 17 and GPIO17 pin 11 (bottom row) plus GND pin 20 (top row). Each net is colour-coded; the receiver is powered from 3.3 volts.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  </style>
  <rect x="0" y="0" width="680" height="492" rx="14" fill="#ffffff" stroke="#e5e3dd" stroke-width="1"/>

  <text x="340" y="42" text-anchor="middle" font-size="16" font-weight="600" fill="#1c1917">Connection map &#8212; Pi 4 header &#183; SEND + RECEIVE IR</text>
  <text x="340" y="64" text-anchor="middle" font-size="12" fill="#6b6760">one header &#8594; an IR blaster (TX) and an IR receiver (RX) on separate pins</text>

  <rect x="52" y="96" width="568" height="90" rx="9" fill="#faf8f4" stroke="#d8d4cc" stroke-width="1.5"/>
  <text x="64" y="90" class="mono" font-size="10" fill="#8a857c">GPIO header &#8212; top view &#183; &#9642; = pin 1 (bottom-left) &#183; even pins 2-40 on the top row</text>
  <rect x="75" y="155" width="10" height="10" fill="#ffffff" stroke="#b8b3aa" stroke-width="1.3"/>

  <g fill="#ffffff" stroke="#d8d4cc" stroke-width="1.1">
    <circle cx="80" cy="128" r="4"/><circle cx="161" cy="128" r="4"/><circle cx="188" cy="128" r="4"/><circle cx="242" cy="128" r="4"/><circle cx="269" cy="128" r="4"/><circle cx="296" cy="128" r="4"/><circle cx="350" cy="128" r="4"/><circle cx="377" cy="128" r="4"/><circle cx="404" cy="128" r="4"/><circle cx="431" cy="128" r="4"/><circle cx="458" cy="128" r="4"/><circle cx="485" cy="128" r="4"/><circle cx="512" cy="128" r="4"/><circle cx="539" cy="128" r="4"/><circle cx="566" cy="128" r="4"/><circle cx="593" cy="128" r="4"/>
    <circle cx="80" cy="160" r="4"/><circle cx="107" cy="160" r="4"/><circle cx="134" cy="160" r="4"/><circle cx="161" cy="160" r="4"/><circle cx="188" cy="160" r="4"/><circle cx="242" cy="160" r="4"/><circle cx="269" cy="160" r="4"/><circle cx="323" cy="160" r="4"/><circle cx="350" cy="160" r="4"/><circle cx="377" cy="160" r="4"/><circle cx="404" cy="160" r="4"/><circle cx="431" cy="160" r="4"/><circle cx="458" cy="160" r="4"/><circle cx="485" cy="160" r="4"/><circle cx="512" cy="160" r="4"/><circle cx="539" cy="160" r="4"/><circle cx="566" cy="160" r="4"/><circle cx="593" cy="160" r="4"/>
  </g>

  <circle cx="107" cy="128" r="7" fill="#e8633a" stroke="#ffffff" stroke-width="1.4"/>
  <circle cx="134" cy="128" r="7" fill="#292524" stroke="#ffffff" stroke-width="1.4"/>
  <circle cx="215" cy="128" r="7" fill="#3b7ff5" stroke="#ffffff" stroke-width="1.4"/>
  <circle cx="323" cy="128" r="7" fill="#292524" stroke="#ffffff" stroke-width="1.4"/>
  <circle cx="215" cy="160" r="7" fill="#2f9e5f" stroke="#ffffff" stroke-width="1.4"/>
  <circle cx="296" cy="160" r="7" fill="#e0a531" stroke="#ffffff" stroke-width="1.4"/>
  <g class="mono" font-size="9" fill="#8a857c" text-anchor="middle">
    <text x="80" y="118">2</text><text x="107" y="118">4</text><text x="134" y="118">6</text><text x="215" y="118">12</text><text x="323" y="118">20</text>
    <text x="80" y="180">1</text><text x="215" y="180">11</text><text x="296" y="180">17</text>
  </g>

  <path d="M107,135 V146 H94 V315 H140 V332" fill="none" stroke="#e8633a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M134,135 V146 H121 V300 H195 V332" fill="none" stroke="#292524" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M215,135 V146 H229 V318 H255 V332" fill="none" stroke="#3b7ff5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M215,167 L204,180 V285 H223 Q229,279 235,285 H430 V332" fill="none" stroke="#2f9e5f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M296,167 L285,180 V265 H495 V332" fill="none" stroke="#e0a531" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M323,135 V146 H337 V245 H560 V332" fill="none" stroke="#292524" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="95" y="332" width="190" height="88" rx="10" fill="#ffffff" stroke="#3b7ff5" stroke-width="1.8"/>
  <circle cx="140" cy="332" r="4.5" fill="#e8633a"/><circle cx="195" cy="332" r="4.5" fill="#292524"/><circle cx="255" cy="332" r="4.5" fill="#3b7ff5"/>
  <g class="mono" font-size="9" fill="#6b6760" text-anchor="middle"><text x="140" y="350">5V</text><text x="195" y="350">GND</text><text x="255" y="350">GPIO18</text></g>
  <text x="190" y="384" text-anchor="middle" font-size="13" font-weight="600" fill="#1b4fb3">IR blaster (TX)</text>
  <text x="190" y="404" text-anchor="middle" font-size="10" fill="#6b6760">2N2222 + IR LED &#183; sends</text>

  <rect x="380" y="332" width="215" height="88" rx="10" fill="#ffffff" stroke="#2f9e5f" stroke-width="1.8"/>
  <circle cx="430" cy="332" r="4.5" fill="#2f9e5f"/><circle cx="495" cy="332" r="4.5" fill="#e0a531"/><circle cx="560" cy="332" r="4.5" fill="#292524"/>
  <g class="mono" font-size="9" fill="#6b6760" text-anchor="middle"><text x="430" y="350">OUT</text><text x="495" y="350">VS(+)</text><text x="560" y="350">GND</text></g>
  <text x="487" y="384" text-anchor="middle" font-size="13" font-weight="600" fill="#1e7a49">IR receiver (RX)</text>
  <text x="487" y="404" text-anchor="middle" font-size="10" fill="#6b6760">TSOP38238 &#183; learns</text>

  <g font-size="10" fill="#6b6760">
    <circle cx="58" cy="446" r="5" fill="#e8633a"/><text x="67" y="449">5V &#183; p4</text>
    <circle cx="150" cy="446" r="5" fill="#e0a531"/><text x="159" y="449">3V3 &#183; p17</text>
    <circle cx="258" cy="446" r="5" fill="#3b7ff5"/><text x="267" y="449">GPIO18 &#183; p12 (TX)</text>
    <circle cx="410" cy="446" r="5" fill="#2f9e5f"/><text x="419" y="449">GPIO17 &#183; p11 (RX)</text>
    <circle cx="540" cy="446" r="5" fill="#292524"/><text x="549" y="449">GND &#183; p6/p20</text>
  </g>
  <text x="340" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#b23c14">&#9888; Receiver VS = 3.3 V (pin 17), never 5 V &#183; GND = any ground pin &#183; little &#8745; hop = wires cross, not joined</text>
</svg>
