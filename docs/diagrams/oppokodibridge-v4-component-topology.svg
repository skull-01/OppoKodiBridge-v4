<svg width="816" height="535" viewBox="0 0 680 446" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>OppoKodiBridge v4 — component topology</title>
  <desc>The Kodi host runs the OppoKodiBridge add-on (service + external-player processes), the Kodi core, and the script.cecreclaim helper. These reach four physical devices — the OPPO player, a Raspberry Pi IR blaster, the TV, and an NFS share — over HTTP on port 436, SSH, JSON-RPC on port 8080, HDMI-CEC and IR.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .t{font-weight:500;font-size:14px;fill:#1c1917}
    .ts{font-weight:400;font-size:12px;fill:#6b6760}
    .th{font-weight:600;font-size:14px;fill:#1c1917}
    .box{fill:#f7f6f3;stroke:#b4b2a9;stroke-width:1.5}
    .n-purple{fill:#eeedfe;stroke:#534ab7;stroke-width:1.5}
    .n-teal{fill:#e1f5ee;stroke:#0f6e56;stroke-width:1.5}
    .n-gray{fill:#f1efe8;stroke:#5f5e5a;stroke-width:1.5}
    .eT{stroke:#1d9e75;stroke-width:1.6;fill:none}
    .eC{stroke:#d85a30;stroke-width:1.6;fill:none}
    .eG{stroke:#8a857c;stroke-width:1.5;fill:none}
    .dash{stroke-dasharray:5 4}
  </style>
  <defs>
    <marker id="ahT" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="9" markerHeight="9" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#1d9e75" stroke-width="1.4"/></marker>
    <marker id="ahC" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="9" markerHeight="9" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#d85a30" stroke-width="1.4"/></marker>
    <marker id="ahG" viewBox="0 0 8 6" refX="6" refY="3" markerWidth="9" markerHeight="9" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#8a857c" stroke-width="1.4"/></marker>
  </defs>

  <rect x="0" y="0" width="680" height="446" rx="14" fill="#ffffff" stroke="#e5e3dd" stroke-width="1"/>
  <text class="th" x="40" y="28" style="font-size:16px">OppoKodiBridge v4 — component topology</text>

  <g transform="translate(0,36)">
    <text class="th" x="34" y="46">Kodi host — CoreELEC (Ugoos)</text>
    <text class="th" x="446" y="46">physical devices</text>
    <rect class="box" x="30" y="54" width="278" height="286" rx="12"/>
    <rect class="box" x="440" y="54" width="210" height="302" rx="12"/>

    <g><rect class="n-gray" x="44" y="72" width="250" height="58" rx="8"/><text class="t" x="169" y="97" text-anchor="middle">Kodi</text><text class="ts" x="169" y="115" text-anchor="middle">playercorefactory · CEC · RPC</text></g>
    <g><rect class="n-purple" x="44" y="156" width="250" height="58" rx="8"/><text class="t" x="169" y="181" text-anchor="middle">OppoKodiBridge add-on</text><text class="ts" x="169" y="199" text-anchor="middle">service + external-player</text></g>
    <g><rect class="n-gray" x="44" y="248" width="250" height="58" rx="8"/><text class="t" x="169" y="273" text-anchor="middle">script.cecreclaim</text><text class="ts" x="169" y="291" text-anchor="middle">CEC helper add-on</text></g>

    <g><rect class="n-teal" x="452" y="72" width="186" height="54" rx="8"/><text class="t" x="545" y="95" text-anchor="middle">OPPO 4K player</text><text class="ts" x="545" y="112" text-anchor="middle">M920x · app API :436</text></g>
    <g><rect class="n-teal" x="452" y="150" width="186" height="54" rx="8"/><text class="t" x="545" y="173" text-anchor="middle">NFS share / proxy</text><text class="ts" x="545" y="190" text-anchor="middle">media source</text></g>
    <g><rect class="n-teal" x="452" y="224" width="186" height="54" rx="8"/><text class="t" x="545" y="247" text-anchor="middle">Raspberry Pi</text><text class="ts" x="545" y="264" text-anchor="middle">IR blaster · ir-ctl</text></g>
    <g><rect class="n-teal" x="452" y="300" width="186" height="54" rx="8"/><text class="t" x="545" y="323" text-anchor="middle">TCL TV</text><text class="ts" x="545" y="340" text-anchor="middle">HDMI-CEC + IR</text></g>

    <line class="eG dash" x1="169" y1="130" x2="169" y2="154" marker-end="url(#ahG)"/>
    <text class="ts" x="176" y="146">spawns player</text>
    <line class="eG dash" x1="169" y1="214" x2="169" y2="246" marker-end="url(#ahG)"/>
    <text class="ts" x="176" y="234">JSON-RPC :8080</text>
    <line class="eT" x1="294" y1="180" x2="450" y2="100" marker-end="url(#ahT)"/>
    <text class="ts" x="350" y="126">HTTP :436</text>
    <line class="eC" x1="294" y1="200" x2="450" y2="248" marker-end="url(#ahC)"/>
    <text class="ts" x="328" y="240">SSH &#8594; ir-ctl</text>
    <line class="eT" x1="294" y1="278" x2="450" y2="322" marker-end="url(#ahT)"/>
    <text class="ts" x="330" y="312">HDMI-CEC</text>
    <line class="eT" x1="545" y1="126" x2="545" y2="148" marker-end="url(#ahT)"/>
    <text class="ts" x="552" y="141">mounts</text>
    <line class="eC" x1="545" y1="278" x2="545" y2="298" marker-end="url(#ahC)"/>
    <text class="ts" x="552" y="292">IR</text>

    <rect class="n-purple" x="40" y="366" width="12" height="12" rx="2"/><text class="ts" x="58" y="376">our software</text>
    <rect class="n-teal" x="150" y="366" width="12" height="12" rx="2"/><text class="ts" x="168" y="376">device</text>
    <rect class="n-gray" x="248" y="366" width="12" height="12" rx="2"/><text class="ts" x="266" y="376">Kodi / helper</text>
    <line class="eT" x1="40" y1="392" x2="60" y2="392"/><text class="ts" x="66" y="396">data / AV</text>
    <line class="eC" x1="150" y1="392" x2="170" y2="392"/><text class="ts" x="176" y="396">IR</text>
    <line class="eG dash" x1="210" y1="392" x2="230" y2="392"/><text class="ts" x="236" y="396">spawn / RPC</text>
  </g>
</svg>
