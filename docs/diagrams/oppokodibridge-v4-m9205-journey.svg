<svg width="816" height="840" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>OppoKodiBridge v4 — M9205 user journey</title>
  <desc>On the M9205 everything is automatic. 1 You play a disc in Kodi and Kodi routes it to the external player with no blip. 2 The add-on grabs the TV by power-cycling the OPPO with #POF then #PON. 3 The TV switches to the OPPO input automatically via the OPPO's own One-Touch-Play — no manual step. 4 The add-on plays the disc on the OPPO over HTTP and NFS. 5 Stop is watched over HTTP /getglobalinfo polling (since v4.1.3 the verbose #SVM 3 channel on port 23 is never opened on any model). 6 You press Stop or the disc ends. 7 The TV returns to Kodi automatically via the script.cecreclaim helper running CECActivateSource. The M9205 is fully automatic on both sides; it differs from the M9207 only in that the grab works.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .t{font-weight:500;font-size:14px;fill:#292524}
    .ts{font-weight:400;font-size:12px;fill:#6b6760}
    .tg{fill:#14633f}.tgs{fill:#1f7d54}.tb{fill:#1b4fb3}.tbs{fill:#2f63c9}
    .gray{fill:#f2f0ea;stroke:#d8d4cc;stroke-width:1.5}
    .green{fill:#e7f4ee;stroke:#1f9d6b;stroke-width:1.5}
    .blue{fill:#e9f0fe;stroke:#3b7ff5;stroke-width:1.5}
    .a{stroke:#8a857c;stroke-width:1.5;fill:none}
  </style>
  <defs>
    <marker id="aN" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8a857c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <rect x="0" y="0" width="680" height="700" rx="14" fill="#ffffff" stroke="#e5e3dd" stroke-width="1"/>
  <text class="t" x="40" y="28" style="font-size:16px;fill:#1c1917" font-weight="600">OppoKodiBridge v4 — M9205 user journey</text>

  <g transform="translate(0,36)">
    <g><rect class="gray" x="78" y="56" width="534" height="58" rx="10"/><text class="t" x="98" y="81">1 · Play a disc in Kodi</text><text class="ts" x="98" y="99">You — Kodi routes it to the external player (no blip)</text></g>
    <g><rect class="green" x="78" y="128" width="534" height="58" rx="10"/><text class="t tg" x="98" y="153">2 · The OPPO grabs the TV</text><text class="ts tgs" x="98" y="171">Add-on → OPPO — power-cycle #POF→#PON (~20-24s)</text></g>
    <g><rect class="green" x="78" y="200" width="534" height="58" rx="10"/><text class="t tg" x="98" y="225">3 · TV switches to the OPPO — automatically</text><text class="ts tgs" x="98" y="243">the OPPO's own One-Touch-Play (no manual step)</text></g>
    <g><rect class="gray" x="78" y="272" width="534" height="58" rx="10"/><text class="t" x="98" y="297">4 · OPPO plays the disc over HTTP / NFS</text><text class="ts" x="98" y="315">Add-on → OPPO — wake, init, mount, play (:436)</text></g>
    <g><rect class="gray" x="78" y="344" width="534" height="58" rx="10"/><text class="t" x="98" y="369">5 · Stop is watched over HTTP</text><text class="ts" x="98" y="387">Add-on — /getglobalinfo poll until idle (no :23, since v4.1.3)</text></g>
    <g><rect class="gray" x="78" y="416" width="534" height="58" rx="10"/><text class="t" x="98" y="441">6 · Press Stop (or the disc ends)</text><text class="ts" x="98" y="459">You</text></g>
    <g><rect class="blue" x="78" y="488" width="534" height="58" rx="10"/><text class="t tb" x="98" y="513">7 · TV returns to Kodi — automatically</text><text class="ts tbs" x="98" y="531">Auto — script.cecreclaim → CECActivateSource (Kodi's own source)</text></g>

    <line class="a" x1="345" y1="114" x2="345" y2="128" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="186" x2="345" y2="200" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="258" x2="345" y2="272" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="330" x2="345" y2="344" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="402" x2="345" y2="416" marker-end="url(#aN)"/>
    <line class="a" x1="345" y1="474" x2="345" y2="488" marker-end="url(#aN)"/>

    <rect x="78" y="566" width="16" height="12" rx="2" fill="#1f9d6b"/>
    <text class="ts" x="102" y="576">Automatic OPPO grab — its own One-Touch-Play (M9205)</text>
    <rect x="78" y="588" width="16" height="12" rx="2" fill="#3b7ff5"/>
    <text class="ts" x="102" y="598">Automatic Kodi reclaim — via the script.cecreclaim helper</text>
    <text class="ts" x="78" y="620">Fully automatic on both sides; stop detection is HTTP-only (all models) — differs from M9207 only in the grab</text>
  </g>
</svg>
